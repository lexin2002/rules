  # 直连与基础网络规则
  - RULE-SET,DirectList1,🎯 全球直连
  - RULE-SET,LocalAreaNetwork,🎯 全球直连
  - RULE-SET,UnBan,🎯 全球直连
  - RULE-SET,GoogleCN,🎯 全球直连
  - RULE-SET,SteamCN,🎯 全球直连
  - RULE-SET,ChinaDomain,🎯 全球直连
  - RULE-SET,ChinaCompanyIp,🎯 全球直连
  - RULE-SET,Download,🎯 全球直连
  
  # 广告与隐私防护
  - RULE-SET,BanEasyListChina,🛑 广告拦截
  - RULE-SET,BanEasyPrivacy,🛡️ 隐私防护
  
  # 应用分流
  - RULE-SET,GoogleFCM,📢 谷歌FCM
  - RULE-SET,GitHub,👨🏿‍💻 GitHub
  - RULE-SET,Microsoft,Ⓜ️ 微软服务
  - RULE-SET,Apple,🍎 Apple
  - RULE-SET,Telegram,📲 Telegram
  - RULE-SET,Speedtest,♻️ Speedtest
  - RULE-SET,AI,💬 Ai平台
  - RULE-SET,OpenAi,💬 Ai平台
  
  # 游戏平台分流
  - RULE-SET,Epic,🎮 游戏平台
  - RULE-SET,Origin,🎮 游戏平台
  - RULE-SET,Sony,🎮 游戏平台
  - RULE-SET,Steam,🎮 游戏平台
  - RULE-SET,Nintendo,🎮 游戏平台
  
  # 流媒体与视频分流
  - RULE-SET,YouTube,📹 YouTube
  - RULE-SET,Netflix,🎥 奈飞视频
  - RULE-SET,TikTok,🎵 TikTok
  - RULE-SET,ChinaMedia,🎞️ 国内媒体
  - RULE-SET,ProxyMedia,🌍 国外媒体
  - RULE-SET,Yellow,🌍 国外媒体
  
  # GFW 列表保底机制
  - RULE-SET,ProxyGFWlist,🚀 节点选择
  
  # 国内IP直连保底
  - GEOIP,CN,🎯 全球直连
  
  # 漏网之鱼处理
  - MATCH,🐟 漏网之鱼