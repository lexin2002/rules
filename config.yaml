# ==========================================
# 基础配置 (General)
# ==========================================
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

# DNS 配置 (可选，提升解析速度和防污染，已添加基础推荐配置)
dns:
  enable: true
  listen: 0.0.0.1:1053
  enhanced-mode: fake-ip
  nameserver:
    - 114.114.114.114
    - 223.5.5.5
    - 8.8.8.8

# ==========================================
# 代理提供者 (Proxy Providers) - ⚠️ 请在此处填入你的订阅链接
# ==========================================
proxy-providers:
  airport_sub:
    type: http
    # 👇把下面双引号里的内容替换成你自己的机场订阅链接
    url: "https://liangxin.xyz/api/v1/liangxin?OwO=6e6bb2b659374035d26b3f7036e8e5f5"
    interval: 3600
    path: ./proxies/airport_sub.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

# ==========================================
# 策略组 (Proxy Groups)
# ==========================================
proxy-groups:
  # ---------------- 1. 应用/服务策略组 ----------------
  - name: 🚀 节点选择
    type: select
    proxies: [🔯 东亚故转, 🔯 日本故转, 🔯 美州故转, 🇭🇰 东亚节点, 🇯🇵 日本节点, 🇺🇸 美州节点, 🛩️ 普通节点, 🕊️ 低速节点, 🐸 手动切换, DIRECT]

  - name: 📹 YouTube
    type: select
    proxies: [🔯 东亚故转, 🔯 日本故转, 🇭🇰 东亚节点, 🇯🇵 日本节点, 🛩️ 普通节点, 🚀 节点选择, 🐸 手动切换, DIRECT]

  - name: 💬 Ai平台
    type: select
    proxies: [🔯 日本故转, 🔯 美州故转, 🇺🇸 美州节点, 🇯🇵 日本节点, 🚀 节点选择, 🐸 手动切换]

  - name: Ⓜ️ 微软服务
    type: select
    proxies: [🔯 日本故转, 🔯 东亚故转, 🔯 美州故转, 🇯🇵 日本节点, 🇭🇰 东亚节点, 🇺🇸 美州节点, 🛩️ 普通节点, 🚀 节点选择, 🐸 手动切换, DIRECT]

  - name: 👨🏿‍💻 GitHub
    type: select
    proxies: [🔯 东亚故转, 🔯 日本故转, 🔯 美州故转, 🇭🇰 东亚节点, 🇯🇵 日本节点, 🇺🇸 美州节点, 🛩️ 普通节点, 🚀 节点选择, 🐸 手动切换, DIRECT]

  - name: 🍎 Apple
    type: select
    proxies: [DIRECT, 🇭🇰 东亚节点, 🇯🇵 日本节点, 🇺🇸 美州节点, 🐸 手动切换, 🚀 节点选择]

  - name: 🎵 TikTok
    type: select
    proxies: [🔯 日本故转, 🔯 美州故转, 🇯🇵 日本节点, 🇺🇸 美州节点, 🛩️ 普通节点, 🚀 节点选择, 🐸 手动切换]

  - name: 🎥 奈飞视频
    type: select
    proxies: [🔯 东亚故转, 🔯 日本故转, 🔯 美州故转, 🇭🇰 东亚节点, 🇯🇵 日本节点, 🛩️ 普通节点, 🎥 奈飞节点, 🚀 节点选择, 🐸 手动切换]

  - name: 📲 Telegram
    type: select
    proxies: [🔯 东亚故转, 🔯 日本故转, 🔯 美州故转, 🇭🇰 东亚节点, 🇯🇵 日本节点, 🚀 节点选择, 🐸 手动切换]

  - name: 📢 谷歌FCM
    type: select
    proxies: [🔯 东亚故转, 🔯 日本故转, 🔯 美州故转, 🇭🇰 东亚节点, 🇯🇵 日本节点, 🚀 节点选择, 🐸 手动切换]

  - name: 🎮 游戏平台
    type: select
    proxies: [🔯 东亚故转, 🔯 日本故转, 🔯 美州故转, 🇭🇰 东亚节点, 🇯🇵 日本节点, 🛩️ 普通节点, 🚀 节点选择, 🐸 手动切换, DIRECT]

  - name: 🌍 国外媒体
    type: select
    proxies: [🔯 东亚故转, 🔯 日本故转, 🔯 美州故转, 🇭🇰 东亚节点, 🇯🇵 日本节点, 🛩️ 普通节点, 🚀 节点选择, 🐸 手动切换]

  - name: 🎞️ 国内媒体
    type: select
    proxies: [DIRECT, 🚀 节点选择, 🐸 手动切换]

  - name: ♻️ Speedtest
    type: select
    proxies: [DIRECT, 🇭🇰 东亚节点, 🇯🇵 日本节点, 🇺🇸 美州节点, 🌐 其他地区]

  - name: 🎯 全球直连
    type: select
    proxies: [DIRECT, 🚀 节点选择, 🐸 手动切换]

  - name: 🛑 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: 🛡️ 隐私防护
    type: select
    proxies: [REJECT, DIRECT]

  - name: 🐟 漏网之鱼
    type: select
    proxies: [DIRECT, 🚀 节点选择, 🇭🇰 东亚节点, 🇯🇵 日本节点, 🐸 手动切换]


  # ---------------- 2. 节点正则筛选组 (Filters) ----------------
  - name: 🐸 手动切换
    type: select
    use: [airport_sub]
    filter: '.*'

  - name: 🛩️ 普通节点
    type: select
    use: [airport_sub]
    filter: '(?=.*(香港|HK|Hong Kong|🇭🇰|HongKong|日本|韩国|巴西|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|新加坡|台湾|TW|Taiwan|荷兰))^((?!(深港|游戏|剩余|流量|0\.5|0\.1|0\.1倍|0\.1x|0\.5倍|0\.5x|2\.0|2倍|2x|3\.0|3倍|3x|4\.0|4倍|4x|5\.0|5倍|5x)).)*$'

  - name: 🕊️ 低速节点
    type: select
    use: [airport_sub]
    filter: '(?=.*(0\.5|0\.5倍|0\.5x|0\.1|0\.1倍|0\.1x))'

  - name: 🇭🇰 东亚节点
    type: select
    use: [airport_sub]
    filter: '(?=.*(香港|HK|Hong Kong|🇭🇰|韩|台湾|HongKong|新加坡|坡|狮城|SG|Singapore))^((?!(深港|US|游戏|剩余|流量|2\.0|2倍|2x|3\.0|3倍|3x|4\.0|4倍|4x|0\.1|0\.1倍|0\.1x)).)*$'

  - name: 🇯🇵 日本节点
    type: select
    use: [airport_sub]
    filter: '(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))^((?!(游戏|剩余|流量|2\.0|2倍|2x|3\.0|3倍|3x|4\.0|4倍|4x|0\.1|0\.1倍|0\.1x)).)*$'

  - name: 🇺🇸 美州节点
    type: select
    use: [airport_sub]
    filter: '(?=.*(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|巴西))^((?!(0\.1x|0\.5x|限速)).)*$'

  - name: 🌐 其他地区
    type: select
    use: [airport_sub]
    filter: '(^(?!.*(香港|HK|Hong Kong|🇭🇰|HongKong|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|新加坡|坡|狮城|SG|Singapore|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|巴西|剩余)).*)'

  - name: 🎥 奈飞节点
    type: select
    use: [airport_sub]
    filter: '(NF|奈飞|解锁|Netflix|NETFLIX|Media|流媒体)'


  # ---------------- 3. 自动回退/故障转移组 (Fallback/Url-test) ----------------
  - name: 🔯 东亚故转
    type: fallback
    use: [airport_sub]
    filter: '(?=.*(香港|HK|Hong Kong|🇭🇰|韩|台湾|HongKong|新加坡|坡|狮城|SG|Singapore))^((?!(深港|游戏|剩余|流量|0\.5|0\.5倍|0\.5x|2\.0|2倍|2x|3\.0|3倍|3x|4\.0|4倍|4x|5\.0|5倍|5x)).)*$'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🔯 日本故转
    type: fallback
    use: [airport_sub]
    filter: '(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))^((?!(深港|游戏|剩余|流量|0\.5|0\.5倍|0\.5x|2\.0|2倍|2x|3\.0|3倍|3x|4\.0|4倍|4x|5\.0|5倍|5x)).)*$'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🔯 美州故转
    type: fallback
    use: [airport_sub]
    filter: '(?=.*(美|荷兰|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|巴西))^((?!(0\.1x|0\.5x|限速)).)*$'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: ♻️ 自动选择
    type: url-test
    use: [airport_sub]
    filter: '.*'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50


