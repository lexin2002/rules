; [地区与正则筛选策略 (强化排雷版)]
; 排除常见的机场提示信息（官网、重置、到期等）以防止报错
custom_proxy_group=🛩️ 普通节点`select`(?=.*(香港|HK|Hong Kong|🇭🇰|HongKong|日本|韩国|巴西|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|新加坡|台湾|TW|Taiwan|荷兰))^((?!(深港|游戏|剩余|流量|官网|到期|重置|群|地址|最新|0\.5|0\.1|0\.1倍|0\.1x|0\.5倍|0\.5x|2\.0|2倍|2x|3\.0|3倍|3x|4\.0|4倍|4x|5\.0|5倍|5x)).)*$
custom_proxy_group=🕊️ 低速节点`select`(?=.*(0\.5|0\.5倍|0\.5x|0\.1|0\.1倍|0\.1x))^((?!(官网|到期|重置|群|地址|最新)).)*$
custom_proxy_group=🇭🇰 东亚节点`select`(?=.*(香港|HK|Hong Kong|🇭🇰|韩|台湾|HongKong|新加坡|坡|狮城|SG|Singapore))^((?!(深港|US|游戏|剩余|流量|官网|到期|重置|群|地址|最新|2\.0|2倍|2x|3\.0|3倍|3x|4\.0|4倍|4x|0\.1|0\.1倍|0\.1x)).)*$
