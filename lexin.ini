custom_proxy_group=🇺🇸 美州节点`select`(?=.*(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|巴西))^((?!(官网|到期|重置|群|地址|最新|0\.1x|0\.5x|限速)).)*$
